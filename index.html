<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volta Duplex</title>
    <script src="Scripts/aframe.min.js"></script>
  </head>
  <body>
    <a-scene
      fog="type: linear; color: #f5d090; near: 80; far: 220"
      renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; exposure: 1.1"
      shadow="type: pcfsoft; autoUpdate: true"
    >
      <!-- ── CAMERAS ── -->
      <a-entity position="0 20 0" rotation="0 0 0">
        <a-camera active="false"></a-camera>
      </a-entity>

      <a-entity position="0 9 30" rotation="0 0 0">
        <a-camera wasd-controls="acceleration: 20" look-controls active="true">
        </a-camera>
      </a-entity>

      <!-- ── ASSETS ── -->
      <a-assets timeout="90000">
        <a-asset-item id="house" src="models/8k/scene.gltf"></a-asset-item>
        <a-asset-item
          id="cabnet"
          src="models/kitchen_cabinets/scene.gltf"
        ></a-asset-item>
        <a-asset-item

        <a-asset-item id="toilet" src="models/toilet/scene.gltf"></a-asset-item>

        ></a-asset-item>
        <a-asset-item
          id="car"
          src="models/2016_bmw_x6m/bmw_x3_m40i.glb"
        ></a-asset-item>
        <a-asset-item
          id="car2"
          src="models/2016_bmw_x6m/bmw_x3_m40i.glb"
        ></a-asset-item>
        <a-asset-item id="bed" src="models/bed_06/scene.gltf"></a-asset-item>
        <a-asset-item
          id="wardrobe"
          src="models/wardrobe/scene.gltf"
        ></a-asset-item>
        <a-asset-item
          id="pool"
          src="models/swimming_pool(2)/scene.gltf"
        ></a-asset-item>
      </a-assets>

      <!-- ── SKY — animated gradient sunrise/golden hour ── -->
      <a-sky color="#e8a040" id="sky"></a-sky>

      <!-- ── LIGHTING ── -->
      <!-- Golden hour sun — low angle, warm, long shadows -->
      <a-light
        type="directional"
        color="#f5aa40"
        intensity="1.6"
        position="-20 14 18"
        cast-shadow="true"
        shadow-camera-far="120"
        shadow-camera-left="-40"
        shadow-camera-right="40"
        shadow-camera-top="40"
        shadow-camera-bottom="-40"
        shadow-bias="-0.001"

      </a-light>
      <!-- Warm bounce fill from opposite -->
      <a-light
        type="directional"
        color="#f0c060"
        intensity="0.4"
        position="20 8 -15"

      <!-- Cool sky ambient -->
      <a-light type="ambient" color="#d0b888" intensity="0.5"></a-light>
      <!-- Hemisphere sky/ground -->

        color="#b8cce0"
        ground-color="#7a6840"
        intensity="0.35"
      ></a-light>
      <!-- Pool shimmer point -->

        position="-2 0.5 -1"
        color="#30a8d8"
        intensity="0.4"
        distance="8"
      ></a-light>

    <script>
      // ── ANIMATED WATER ─────────────────────────────────────────────
      document.addEventListener("DOMContentLoaded", function () {
        const waters = document.querySelectorAll(".water");
        let offset = 0;
        const speed = 0.002;

        function animateWater() {
          offset += speed;
          waters.forEach(function (water) {
            const mat = water.getAttribute("material");
            const currentOpacity = mat && mat.opacity ? mat.opacity : 0.6;
            water.setAttribute("material", {
              src: "Imgs/water.jpeg",
              transparent: true,
              opacity: currentOpacity,
              repeat: "2 2",
              offset: offset + " " + offset * 0.7,
            });
          });
          requestAnimationFrame(animateWater);
        }

        animateWater();
      });

      // ── ANIMATED SKY — slow colour shift dawn → golden hour ────────
      document.addEventListener("DOMContentLoaded", function () {
        const sky = document.getElementById("sky");
        const colours = [
          { r: 220, g: 130, b: 60 }, // deep orange dawn
          { r: 232, g: 160, b: 64 }, // golden hour
          { r: 245, g: 185, b: 90 }, // bright warm noon
          { r: 232, g: 160, b: 64 }, // back to golden
          { r: 220, g: 130, b: 60 }, // cycle
        ];
        let ci = 0;
        let t = 0;
        const duration = 800; // frames per transition

        function lerpColour(a, b, f) {
          return {
            r: Math.round(a.r + (b.r - a.r) * f),
            g: Math.round(a.g + (b.g - a.g) * f),
            b: Math.round(a.b + (b.b - a.b) * f),
          };
        }

        function toHex(c) {
          return (
            "#" +
            c.r.toString(16).padStart(2, "0") +
            c.g.toString(16).padStart(2, "0") +
            c.b.toString(16).padStart(2, "0")
          );
        }

        function animateSky() {
          t++;
          if (t >= duration) {
            t = 0;
            ci = (ci + 1) % (colours.length - 1);
          }
          const from = colours[ci];
          const to = colours[ci + 1];
          const col = lerpColour(from, to, t / duration);
          sky.setAttribute("color", toHex(col));
          requestAnimationFrame(animateSky);
        }

        animateSky();
      });

      // ── FLOATING DUST PARTICLES ────────────────────────────────────
      document.addEventListener("DOMContentLoaded", function () {
        const particles = [
          {
            el: document.getElementById("p1"),
            ox: 5,
            oy: 4,
            oz: -10,
            sp: 0.008,
            amp: 1.2,
          },
          {
            el: document.getElementById("p2"),
            ox: -8,
            oy: 6,
            oz: -15,
            sp: 0.005,
            amp: 0.9,
          },
          {
            el: document.getElementById("p3"),
            ox: 12,
            oy: 3,
            oz: -8,
            sp: 0.007,
            amp: 1.5,
          },
          {
            el: document.getElementById("p4"),
            ox: -3,
            oy: 8,
            oz: -20,
            sp: 0.004,
            amp: 1.0,
          },
          {
            el: document.getElementById("p5"),
            ox: 18,
            oy: 5,
            oz: -5,
            sp: 0.009,
            amp: 0.8,
          },
        ];
        let tick = 0;

        function animateParticles() {
          tick += 0.01;
          particles.forEach(function (p) {
            const x = p.ox + Math.sin(tick * p.sp * 100) * p.amp;
            const y = p.oy + Math.sin(tick * p.sp * 80 + 1) * (p.amp * 0.5);
            const z = p.oz + Math.cos(tick * p.sp * 60) * (p.amp * 0.6);
            p.el.setAttribute("position", x + " " + y + " " + z);
          });
          requestAnimationFrame(animateParticles);
        }

        animateParticles();
      });

      // ── BIRDS DRIFTING ACROSS SKY ──────────────────────────────────
      document.addEventListener("DOMContentLoaded", function () {
        const birdGroup = document.getElementById("bird-group");
        let bx = -80;

        function animateBirds() {
          bx += 0.04;
          if (bx > 120) bx = -80;
          birdGroup.setAttribute("position", bx + " 40 -30");
          requestAnimationFrame(animateBirds);
        }

        animateBirds();
      });
    </script>
